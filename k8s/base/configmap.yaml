apiVersion: v1
kind: ConfigMap
metadata:
  name: icx-portal-config
  namespace: icx-portal
data:
  NODE_ENV: production
  PORT: "5000"
  MONGO_URI: mongodb://mongodb:27017/icx
  JWT_EXPIRY: 8h
  OTP_EXPIRY_MINUTES: "5"
  S3_ENDPOINT: http://minio:9000
  S3_REGION: us-east-1
  S3_BUCKET: icx-uploads
  MAX_FILE_SIZE_MB: "10"
  EMAIL_FROM: support@iamsaif.ai
  CLIENT_URL: https://icx.iamsaif.ai
  # Force IPv4 DNS — Node.js fetch (undici) prefers IPv6 which times out on this cluster
  NODE_OPTIONS: --dns-result-order=ipv4first
