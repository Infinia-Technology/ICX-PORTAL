apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: icx-portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: client
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: client
    spec:
      serviceAccountName: icx-portal   # same SA — both need ghcr-credentials
      imagePullSecrets:
        - name: ghcr-credentials        # created by vault-ghcr CSI volume mount below
      containers:
        - name: client
          image: ghcr.io/infinia-technology/icx-portal-client:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          volumeMounts:
            - name: vault-ghcr-secrets
              mountPath: /mnt/vault-ghcr-secrets
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: vault-ghcr-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: vault-ghcr   # defined in overlays/prod/
---
apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: icx-portal
spec:
  selector:
    app: client
  ports:
    - port: 80
      targetPort: 80
