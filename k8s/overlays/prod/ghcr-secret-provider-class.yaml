# PROD — GHCR pull secret SecretProviderClass
# Vault auth path: 'kubernetes' (prod cluster)
# Secret path:     secret/data/ghcr  (KV mount: secret v2, key: ghcr)
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: vault-ghcr
  namespace: icx-portal
spec:
  provider: vault
  secretObjects:
    - secretName: ghcr-credentials   # K8s Secret created on pod mount — referenced by imagePullSecrets
      type: kubernetes.io/dockerconfigjson
      data:
        - key: .dockerconfigjson
          objectName: dockerconfigjson
  parameters:
    vaultAddress: 'https://vault.iamsaif.ai'
    roleName: 'icx-portal'
    vaultKubernetesMountPath: 'kubernetes'   # PROD auth path
    objects: |
      - objectName: 'dockerconfigjson'
        secretPath: 'secret/data/ghcr'
        secretKey: 'dockerconfigjson'
