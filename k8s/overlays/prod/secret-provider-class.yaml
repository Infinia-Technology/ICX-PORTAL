# PROD — App secrets SecretProviderClass
# Vault auth path: 'kubernetes' (prod cluster)
# Secret path:     secret/data/icx-portal
#
# Vault policy must also include secret/data/minio — update with:
#   kubectl exec -it vault-0 -n vault -- vault policy write icx-portal - <<EOF
#   path "secret/data/icx-portal" { capabilities = ["read"] }
#   path "secret/data/ghcr"       { capabilities = ["read"] }
#   path "secret/data/minio"      { capabilities = ["read"] }
#   EOF
#
# Store secrets in Vault before deploying:
#   kubectl exec -it vault-0 -n vault -- vault kv put secret/icx-portal \
#     JWT_SECRET='your-64-char-secret' \
#     RESEND_API_KEY='re_xxx' \
#     S3_ACCESS_KEY='minioadmin' \
#     S3_SECRET_KEY='minioadmin' \
#     POSTGRES_USER='admin' \
#     POSTGRES_PASSWORD='admin123' \
#     DATABASE_URL='postgresql://admin:admin123@postgres:5432/icx_portal'
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: vault-icx-portal
  namespace: icx-portal
spec:
  provider: vault
  secretObjects:
    - secretName: icx-portal-secret   # K8s Secret created on pod mount
      type: Opaque
      data:
        - key: JWT_SECRET
          objectName: JWT_SECRET
        - key: RESEND_API_KEY
          objectName: RESEND_API_KEY
        - key: S3_ACCESS_KEY
          objectName: S3_ACCESS_KEY
        - key: S3_SECRET_KEY
          objectName: S3_SECRET_KEY
        - key: POSTGRES_USER
          objectName: POSTGRES_USER
        - key: POSTGRES_PASSWORD
          objectName: POSTGRES_PASSWORD
        - key: DATABASE_URL
          objectName: DATABASE_URL
  parameters:
    vaultAddress: 'https://vault.iamsaif.ai'
    roleName: 'icx-portal'
    vaultKubernetesMountPath: 'kubernetes'   # PROD auth path — do NOT change to kubernetes-dev
    objects: |
      - objectName: 'JWT_SECRET'
        secretPath: 'secret/data/icx-portal'
        secretKey: 'JWT_SECRET'
      - objectName: 'RESEND_API_KEY'
        secretPath: 'secret/data/icx-portal'
        secretKey: 'RESEND_API_KEY'
      - objectName: 'S3_ACCESS_KEY'
        secretPath: 'secret/data/icx-portal'
        secretKey: 'S3_ACCESS_KEY'
      - objectName: 'S3_SECRET_KEY'
        secretPath: 'secret/data/icx-portal'
        secretKey: 'S3_SECRET_KEY'
      - objectName: 'POSTGRES_USER'
        secretPath: 'secret/data/icx-portal'
        secretKey: 'POSTGRES_USER'
      - objectName: 'POSTGRES_PASSWORD'
        secretPath: 'secret/data/icx-portal'
        secretKey: 'POSTGRES_PASSWORD'
      - objectName: 'DATABASE_URL'
        secretPath: 'secret/data/icx-portal'
        secretKey: 'DATABASE_URL'
