# PROD — MinIO root credentials SecretProviderClass
# Vault auth path: 'kubernetes' (prod cluster)
# Secret path:     secret/data/minio
#
# Store credentials in Vault before deploying:
#   kubectl exec -it vault-0 -n vault -- vault kv put secret/minio \
#     root-user=minioadmin \
#     root-password=minioadmin
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: vault-minio
  namespace: icx-portal
spec:
  provider: vault
  secretObjects:
    - secretName: minio-secret   # K8s Secret created on pod mount — referenced by minio StatefulSet
      type: Opaque
      data:
        - key: root-user
          objectName: root-user
        - key: root-password
          objectName: root-password
  parameters:
    vaultAddress: 'https://vault.iamsaif.ai'
    roleName: 'icx-portal'
    vaultKubernetesMountPath: 'kubernetes'
    objects: |
      - objectName: 'root-user'
        secretPath: 'secret/data/minio'
        secretKey: 'root-user'
      - objectName: 'root-password'
        secretPath: 'secret/data/minio'
        secretKey: 'root-password'
