services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    ports: [ "5432:5432" ]
    volumes: [ postgres-data:/var/lib/postgresql/data ]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-icx_portal}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-icx_portal}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: unless-stopped
    ports: [ "8081:8080" ]
    depends_on:
      postgres: { condition: service_healthy }

  minio:
    image: minio/minio
    restart: unless-stopped
    ports: [ "9002:9000", "9011:9001" ]
    volumes: [ minio-data:/data ]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 10s
      retries: 3

  server:
    build: ./server
    restart: unless-stopped
    ports: [ "5000:5000" ]
    depends_on:
      postgres: { condition: service_healthy }
      minio: { condition: service_healthy }
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/${POSTGRES_DB:-icx_portal}?schema=public
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', r => process.exit(r.statusCode===200?0:1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  client:
    build: ./client
    restart: unless-stopped
    ports: [ "80:80" ]
    depends_on:
      server: { condition: service_healthy }

volumes:
  postgres-data:
  minio-data:
