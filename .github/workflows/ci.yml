name: CI — Build & Push Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_CLIENT: ghcr.io/infinia-technology/icx-portal-client
  IMAGE_SERVER: ghcr.io/infinia-technology/icx-portal-server

jobs:
  build-client:
    name: Build Client Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_CLIENT }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push client
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-server:
    name: Build Server Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_SERVER }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifest:
    name: Update Manifest
    runs-on: ubuntu-latest
    needs: [build-client, build-server]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update image tags
        env:
          TAG: ${{ needs.build-client.outputs.image_tag }}
        run: |
          sed -i "s|image: ghcr.io/infinia-technology/icx-portal-client:.*|image: ghcr.io/infinia-technology/icx-portal-client:${TAG}|g" k8s/base/client.yaml
          sed -i "s|image: ghcr.io/infinia-technology/icx-portal-server:.*|image: ghcr.io/infinia-technology/icx-portal-server:${TAG}|g" k8s/base/server.yaml
          sed -i "s|image: ghcr.io/infinia-technology/icx-portal-server:.*|image: ghcr.io/infinia-technology/icx-portal-server:${TAG}|g" k8s/jobs/seed-job.yaml

      - name: Commit and push manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/base/client.yaml k8s/base/server.yaml k8s/jobs/seed-job.yaml
          git diff --staged --quiet || git commit -m "chore: update image tags to ${{ needs.build-client.outputs.image_tag }} [skip ci]"
          git push
