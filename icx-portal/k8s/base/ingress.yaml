apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: icx-portal
  namespace: icx-portal
  annotations:
    kubernetes.io/ingress.class: nginx
    # Allow file uploads up to 10MB (matches MAX_FILE_SIZE_MB)
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # TLS redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Forward real client IP — fixes express-rate-limit behind proxy
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    nginx.ingress.kubernetes.io/forwarded-for-header: "X-Forwarded-For"
spec:
  tls:
    - hosts:
        - icx.iamsaif.ai
      secretName: icx-portal-tls
  rules:
    - host: icx.iamsaif.ai
      http:
        paths:
          # API traffic → Express server
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: server
                port:
                  number: 5000
          # Health check → Express server
          - path: /api/health
            pathType: Prefix
            backend:
              service:
                name: server
                port:
                  number: 5000
          # Everything else → React SPA (nginx container)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client
                port:
                  number: 80
